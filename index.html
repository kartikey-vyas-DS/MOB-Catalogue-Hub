<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>MOB Catalogue Hub</title>
<link rel="icon" type="image/png" href="mob_logo.png" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;0,600;1,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
/* ── RESET ───────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html { font-size: 16px; -webkit-text-size-adjust: 100%; }
body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; overscroll-behavior: none; }

/* ── TOKENS ──────────────────────────────────────────────── */
:root {
  --navy:       #0A243F;
  --green:      #00DE9D;
  --green-dark: #00A876;
  --green-faint:#F0FDF8;
  --white:      #ffffff;
  --bg:         #F4F7FA;
  --card:       #ffffff;
  --border:     #E4EAF0;
  --text:       #0A243F;
  --muted:      #7A90A4;
  --light:      #EBF9F4;
  --r-sm: 8px; --r-md: 10px; --r-lg: 14px;
}

/* ── TOPBAR ──────────────────────────────────────────────── */
.topbar {
  background: var(--navy); padding: 0 24px; height: 58px;
  display: flex; align-items: center; justify-content: space-between;
  position: sticky; top: 0; z-index: 200;
}
.logo-area { display: flex; align-items: center; gap: 10px; }
.logo-img   { height: 34px; width: auto; display: block; }
.logo-box   {
  width: 36px; height: 36px; background: var(--green);
  border-radius: var(--r-sm); display: flex; align-items: center; justify-content: center;
  font-family: 'DM Mono', monospace; font-weight: 500; font-size: 12px; color: var(--navy); flex-shrink: 0;
}
.logo-text  { color: var(--white); font-size: 15px; font-weight: 600; letter-spacing: -0.3px; line-height: 1.2; }
.logo-sub   { color: rgba(255,255,255,0.4); font-size: 11px; }
.cart-btn   {
  background: var(--green); border: none; border-radius: var(--r-sm);
  padding: 7px 15px; color: var(--navy);
  font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 600;
  cursor: pointer; display: flex; align-items: center; gap: 8px;
  transition: background 0.15s; min-height: 38px;
}
.cart-btn:hover { background: #00c98e; }
.cart-badge {
  background: var(--navy); color: var(--green); border-radius: 50%;
  width: 20px; height: 20px; font-size: 11px; font-weight: 700;
  display: flex; align-items: center; justify-content: center;
  font-family: 'DM Mono', monospace; flex-shrink: 0;
}

/* ── MAIN ────────────────────────────────────────────────── */
.main { flex: 1; padding: 28px 24px 190px; max-width: 880px; margin: 0 auto; width: 100%; }
.page-header {
  display: flex; align-items: flex-start; justify-content: space-between;
  gap: 12px; margin-bottom: 22px; flex-wrap: wrap;
}
.page-title { font-size: 21px; font-weight: 600; color: var(--navy); letter-spacing: -0.4px; }
.page-sub   { color: var(--muted); font-size: 13px; margin-top: 4px; }

.refresh-btn {
  background: var(--card); border: 1.5px solid var(--border); border-radius: var(--r-sm);
  padding: 8px 15px; color: var(--text); font-family: 'DM Sans', sans-serif;
  font-size: 13px; font-weight: 500; cursor: pointer;
  display: flex; align-items: center; gap: 7px;
  transition: all 0.15s; white-space: nowrap; min-height: 38px; flex-shrink: 0;
}
.refresh-btn:hover { border-color: var(--green); color: var(--navy); }
.refresh-btn.spinning svg { animation: spin 0.7s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

/* ── SEARCH ──────────────────────────────────────────────── */
.search-wrap { position: relative; margin-bottom: 20px; }
.search-icon { position: absolute; left: 13px; top: 50%; transform: translateY(-50%); pointer-events: none; }
.search-input {
  width: 100%; border: 1.5px solid var(--border); border-radius: var(--r-md);
  padding: 11px 44px 11px 42px; font-family: 'DM Sans', sans-serif;
  font-size: 15px; color: var(--navy); background: var(--card);
  outline: none; transition: border-color 0.15s; -webkit-appearance: none;
}
.search-input:focus { border-color: var(--green); }
.search-input::placeholder { color: var(--muted); }
.search-clear {
  position: absolute; right: 11px; top: 50%; transform: translateY(-50%);
  background: var(--muted); border: none; border-radius: 50%;
  width: 22px; height: 22px; cursor: pointer;
  display: none; align-items: center; justify-content: center;
  color: white; font-size: 12px; font-weight: 700; line-height: 1; padding: 0;
}
.search-clear:hover { background: var(--navy); }
.search-clear.show  { display: flex; }

/* ── TABS ────────────────────────────────────────────────── */
.tabs-row { display: flex; gap: 7px; flex-wrap: wrap; margin-bottom: 24px; }
.tab {
  padding: 8px 16px; border-radius: 50px; border: 1.5px solid var(--border);
  background: var(--card); color: var(--muted); font-size: 13px; font-weight: 500;
  cursor: pointer; transition: all 0.15s; font-family: 'DM Sans', sans-serif;
  min-height: 36px; display: flex; align-items: center;
}
.tab:hover  { border-color: var(--green); color: var(--navy); }
.tab.active { background: var(--navy); color: var(--white); border-color: var(--navy); }

/* ── CATEGORY ────────────────────────────────────────────── */
.category-section { margin-bottom: 30px; }
.cat-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 14px; padding-bottom: 11px; border-bottom: 1.5px solid var(--border);
}
.cat-title-row { display: flex; align-items: center; gap: 10px; }
.cat-initial {
  width: 30px; height: 30px; border-radius: 7px; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  font-family: 'DM Mono', monospace; font-size: 13px; font-weight: 500;
}
.cat-name  { font-size: 15px; font-weight: 600; color: var(--navy); }
.cat-count {
  background: var(--light); color: var(--green-dark);
  font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 50px;
  font-family: 'DM Mono', monospace;
}
.select-all-btn {
  background: none; border: 1px solid var(--border); border-radius: 6px;
  padding: 5px 13px; color: var(--muted); font-size: 12px; font-weight: 500;
  cursor: pointer; font-family: 'DM Sans', sans-serif; transition: all 0.15s; min-height: 30px;
}
.select-all-btn:hover { border-color: var(--green); color: var(--navy); }
.select-all-btn.all-selected { border-color: var(--green); color: var(--green-dark); background: var(--green-faint); }

/* ── GRID ────────────────────────────────────────────────── */
.brands-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(185px, 1fr)); gap: 10px; }

/* ═══════════════════════════════════════════════════════════
   BRAND CARD — split into SELECT ZONE (top 78%) + OPEN ZONE (bottom 22%)
   No hover overlay. Two distinct tap targets. Clean always.
   ═══════════════════════════════════════════════════════════ */
.brand-card {
  background: var(--card); border: 1.5px solid var(--border);
  border-radius: var(--r-md); cursor: pointer;
  transition: border-color 0.15s, box-shadow 0.15s;
  position: relative; user-select: none; -webkit-user-select: none;
  display: flex; flex-direction: column;
  overflow: hidden;
}
.brand-card:hover { border-color: var(--green); box-shadow: 0 0 0 3px rgba(0,222,157,0.10); }
.brand-card.selected {
  border-color: var(--green); background: var(--green-faint);
  box-shadow: 0 0 0 3px rgba(0,222,157,0.15);
}

/* SELECT ZONE — top portion, clicking selects/deselects */
.card-select-zone {
  padding: 14px 14px 10px;
  flex: 1;
  display: flex; flex-direction: column; gap: 6px;
  position: relative;
}
.card-select-zone:active { opacity: 0.85; }

/* check circle */
.check-circle {
  width: 21px; height: 21px; border-radius: 50%;
  border: 1.5px solid var(--border); background: var(--white);
  position: absolute; top: 11px; right: 11px;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.15s; flex-shrink: 0; pointer-events: none;
}
.brand-card.selected .check-circle { background: var(--green); border-color: var(--green); }
.check-icon { display: none; pointer-events: none; }
.brand-card.selected .check-icon { display: block; }

.card-badge {
  width: 32px; height: 32px; border-radius: var(--r-sm); flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  font-family: 'DM Mono', monospace; font-size: 13px; font-weight: 500;
  pointer-events: none;
}

/* text truncation — no more broken overflow */
.brand-name {
  font-size: 13px; font-weight: 600; color: var(--navy);
  line-height: 1.35; padding-right: 28px;
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
  overflow: hidden; word-break: break-word;
  pointer-events: none;
}
.brand-sub {
  font-size: 11px; color: var(--muted);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  pointer-events: none;
}

/* OPEN ZONE — bottom strip, always visible, tapping opens catalogue */
.card-open-zone {
  display: flex; align-items: center; justify-content: center; gap: 6px;
  padding: 7px 12px;
  background: var(--bg);
  border-top: 1px solid var(--border);
  transition: background 0.15s;
  cursor: pointer;
  flex-shrink: 0;
}
.card-open-zone:hover, .card-open-zone:active { background: var(--light); }
.card-open-zone svg { flex-shrink: 0; }
.card-open-label {
  font-size: 11px; font-weight: 500; color: var(--muted);
  white-space: nowrap;
}
.card-open-zone:hover .card-open-label,
.card-open-zone:active .card-open-label { color: var(--green-dark); }

/* ── SEARCH HIGHLIGHT ────────────────────────────────────── */
.hl { background: rgba(0,222,157,0.3); border-radius: 3px; padding: 0 2px; }

/* ── STATES ──────────────────────────────────────────────── */
.loading-state { text-align: center; padding: 70px 20px; color: var(--muted); font-size: 14px; }
.dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: var(--green); animation: pulse 1.2s ease-in-out infinite; margin: 0 3px; }
.dot:nth-child(2) { animation-delay: .2s; } .dot:nth-child(3) { animation-delay: .4s; }
@keyframes pulse { 0%,100%{opacity:.3;transform:scale(.8);}50%{opacity:1;transform:scale(1.1);} }
.empty-state { text-align: center; padding: 60px 20px; color: var(--muted); font-size: 14px; line-height: 1.7; }
.empty-icon  { font-size: 30px; margin-bottom: 12px; }

/* ── BOTTOM BAR ──────────────────────────────────────────── */
.bottom-bar {
  position: fixed; bottom: 0; left: 0; right: 0;
  background: var(--navy); padding: 15px 24px;
  padding-bottom: calc(15px + env(safe-area-inset-bottom));
  z-index: 300; transform: translateY(110%);
  transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
  border-top: 2px solid rgba(0,222,157,0.2);
}
.bottom-bar.visible { transform: translateY(0); }
.bottom-inner { max-width: 880px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; gap: 14px; }
.sel-summary { color: rgba(255,255,255,0.6); font-size: 13px; line-height: 1.5; min-width: 0; flex: 1; }
.sel-summary strong { color: var(--white); font-weight: 600; display: block; }
.bottom-actions { display: flex; gap: 9px; align-items: center; flex-shrink: 0; }

.clear-btn {
  background: rgba(255,255,255,0.10); border: 1.5px solid rgba(255,255,255,0.22);
  border-radius: var(--r-sm); padding: 9px 17px; color: var(--white);
  font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 500;
  cursor: pointer; transition: all 0.15s; min-height: 40px; white-space: nowrap;
}
.clear-btn:hover { background: rgba(255,255,255,0.18); border-color: rgba(255,255,255,0.4); }

.copy-btn {
  background: var(--green); border: none; border-radius: var(--r-sm);
  padding: 9px 20px; color: var(--navy);
  font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 700;
  cursor: pointer; transition: all 0.15s;
  display: flex; align-items: center; gap: 7px; min-height: 40px; white-space: nowrap;
}
.copy-btn:hover { background: #00c98e; }
.copy-btn:active { transform: scale(0.97); }

/* ── TOAST ───────────────────────────────────────────────── */
.toast {
  position: fixed; top: 66px; right: 16px; max-width: 320px;
  background: var(--navy); color: white; padding: 10px 16px;
  border-radius: var(--r-sm); font-size: 13px; font-weight: 500;
  border-left: 3px solid var(--green); z-index: 500;
  opacity: 0; transform: translateY(-8px); transition: all 0.25s; pointer-events: none;
}
.toast.show { opacity: 1; transform: translateY(0); }

/* ── CONSOLE PANEL ───────────────────────────────────────── */
#console-panel {
  position: fixed; bottom: 0; left: 0; right: 0; max-height: 220px;
  background: #0d1117; color: #58d68d; font-family: 'DM Mono', monospace;
  font-size: 11px; overflow-y: auto; z-index: 9999;
  border-top: 2px solid #2ea043; display: none; padding: 8px 12px;
}
#console-toggle {
  position: fixed; bottom: 6px; left: 8px;
  background: #0d1117; color: #58d68d; border: 1px solid #2ea043;
  border-radius: 4px; font-family: 'DM Mono', monospace; font-size: 10px;
  padding: 3px 8px; cursor: pointer; z-index: 10000; opacity: 0.7;
}
#console-toggle:hover { opacity: 1; }
.clog  { color: #58d68d; margin: 1px 0; }
.cwarn { color: #f0ad4e; margin: 1px 0; }
.cerr  { color: #e74c3c; margin: 1px 0; }

/* ── MOBILE ──────────────────────────────────────────────── */
@media (max-width: 600px) {
  .topbar { padding: 0 16px; height: 54px; }
  .logo-sub { display: none; }
  .main { padding: 18px 14px 200px; }
  .brands-grid { grid-template-columns: 1fr 1fr; gap: 9px; }
  .card-select-zone { padding: 11px 11px 8px; }
  .brand-name { font-size: 12px; }
  .bottom-inner { flex-direction: column; align-items: stretch; gap: 10px; }
  .sel-summary { text-align: center; }
  .bottom-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 9px; }
  .copy-btn { justify-content: center; }
  .clear-btn { text-align: center; }
  .toast { right: 14px; left: 14px; max-width: none; }
}
@media (max-width: 380px) {
  .brands-grid { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<div id="app" style="display:flex;flex-direction:column;min-height:100vh;">

  <!-- TOPBAR -->
  <div class="topbar">
    <div class="logo-area">
      <img src="mob_logo.png" style="height:34px;width:auto;" alt="MOB" />
      <div>
        <div class="logo-text">Mad Over Buildings</div>
        <div class="logo-sub">Catalogue Hub</div>
      </div>
    </div>
    <button class="cart-btn" id="cart-btn">
      Selected <span class="cart-badge" id="cart-count">0</span>
    </button>
  </div>

  <!-- MAIN -->
  <div class="main">
    <div class="page-header">
      <div>
        <div class="page-title">Share Catalogues</div>
        <div class="page-sub">Tap cards to select · bottom strip to open</div>
      </div>
      <button class="refresh-btn" id="refresh-btn" onclick="refreshSheet()">
        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.2" viewBox="0 0 24 24">
          <path d="M23 4v6h-6"/><path d="M1 20v-6h6"/>
          <path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/>
        </svg>
        Refresh
      </button>
    </div>

    <div class="search-wrap">
      <svg class="search-icon" width="16" height="16" fill="none" stroke="#7A90A4" stroke-width="2" viewBox="0 0 24 24">
        <circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/>
      </svg>
      <input class="search-input" id="search-input"
        placeholder="Search brands or catalogues..."
        oninput="onSearch(this.value)" autocomplete="off" />
      <button class="search-clear" id="search-clear" onclick="clearSearch()">✕</button>
    </div>

    <div class="tabs-row" id="tabs-row"></div>
    <div id="content-area">
      <div class="loading-state">
        <div><span class="dot"></span><span class="dot"></span><span class="dot"></span></div>
        <div style="margin-top:16px;">Loading catalogues...</div>
      </div>
    </div>
  </div>

  <!-- BOTTOM BAR -->
  <div class="bottom-bar" id="bottom-bar">
    <div class="bottom-inner">
      <div class="sel-summary" id="sel-summary"></div>
      <div class="bottom-actions">
        <button class="clear-btn" onclick="clearAll()">Clear all</button>
        <button class="copy-btn" id="copy-btn" onclick="copyMessage()">
          <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.2" viewBox="0 0 24 24">
            <rect x="9" y="9" width="13" height="13" rx="2"/>
            <path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/>
          </svg>
          Copy Message
        </button>
      </div>
    </div>
  </div>

  <!-- TOAST -->
  <div class="toast" id="toast"></div>

</div>

<!-- DEV CONSOLE (toggle with the small button bottom-left) -->
<button id="console-toggle" onclick="toggleConsole()">console</button>
<div id="console-panel"></div>

<script>
/* ═══════════════════════════════════════════════════════
   CONFIG — replace with your published Google Sheet CSV URL
   Sheet columns: Category | Brand | Catalogue Name | Link
   ═══════════════════════════════════════════════════════ */
const SHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTsSvDanlWLesPkOqLT0MIJ7DqHLXAuY8AeCea6JXRTrkYrJW7oe8FQRCM91pQJ5VhYFZjR-QyuVHG_/pub?output=csv";

/* ── DEV CONSOLE ─────────────────────────────────────── */
const panel = document.getElementById('console-panel');
function clog(msg, type) {
  const d = document.createElement('div');
  d.className = type || 'clog';
  d.textContent = '[' + new Date().toLocaleTimeString() + '] ' + msg;
  panel.appendChild(d);
  panel.scrollTop = panel.scrollHeight;
}
function toggleConsole() {
  panel.style.display = panel.style.display === 'block' ? 'none' : 'block';
}
// Intercept global errors
window.onerror = (msg, src, line) => { clog('ERROR: ' + msg + ' (line ' + line + ')', 'cerr'); };
window.addEventListener('unhandledrejection', e => { clog('PROMISE: ' + (e.reason||e), 'cerr'); });

/* ── PALETTE ─────────────────────────────────────────── */
const PALETTE = [
  {bg:"#EBF9F4",fg:"#00A876"},{bg:"#EEF2FF",fg:"#4338CA"},
  {bg:"#FFF7ED",fg:"#C2610C"},{bg:"#FDF2F8",fg:"#BE185D"},
  {bg:"#F0F9FF",fg:"#0369A1"},{bg:"#ECFDF5",fg:"#047857"},
  {bg:"#FEFCE8",fg:"#854D0E"},{bg:"#FFF1F2",fg:"#BE123C"},
  {bg:"#F5F3FF",fg:"#6D28D9"},{bg:"#ECFEFF",fg:"#0E7490"},
];
let catColors = {}, palIdx = 0;
function catColor(c) {
  if (!catColors[c]) catColors[c] = PALETTE[palIdx++ % PALETTE.length];
  return catColors[c];
}
function initial(s) { return (s||'?').trim().charAt(0).toUpperCase(); }

/* ── STATE ───────────────────────────────────────────── */
let allData   = [];
let selected  = new Set();  // Set of keys
let activeTab = "All";
let searchQ   = "";

/* ── KEY ─────────────────────────────────────────────── */
function getKey(r) {
  return r.Category + '||' + r.Brand + '||' + (r['Catalogue Name'] || r.Brand);
}

/* ── SHEET LOAD ──────────────────────────────────────── */
async function loadSheet(isRefresh) {
  const btn = document.getElementById('refresh-btn');
  if (isRefresh) { btn.classList.add('spinning'); btn.disabled = true; }
  clog(isRefresh ? 'Refreshing sheet...' : 'Loading sheet...');

  try {
    const url = SHEET_CSV_URL + (SHEET_CSV_URL.includes('?') ? '&' : '?') + 't=' + Date.now();
    clog('Fetching: ' + url);
    const resp = await fetch(url);
    clog('Response status: ' + resp.status);
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    const text = await resp.text();
    clog('Raw CSV length: ' + text.length + ' chars');
    const parsed = parseCSV(text);
    clog('Parsed rows: ' + parsed.length);
    if (!parsed.length) throw new Error('No valid rows found — check column names: Category, Brand, Catalogue Name, Link');
    allData = parsed;
    catColors = {}; palIdx = 0;
    if (isRefresh) showToast('✓ Refreshed — ' + allData.length + ' catalogues loaded');
  } catch(e) {
    clog('LOAD ERROR: ' + e.message, 'cerr');
    if (!allData.length) {
      document.getElementById('content-area').innerHTML =
        `<div class="empty-state">
          <div class="empty-icon">⚠️</div>
          <strong style="color:var(--navy)">Could not load catalogues</strong><br>
          <span style="font-size:12px;color:var(--muted)">Check the sheet URL in the HTML and make sure it's published as CSV.<br>
          Open the console (bottom-left) for details.</span>
        </div>`;
      if (isRefresh) { btn.classList.remove('spinning'); btn.disabled = false; }
      return;
    }
    if (isRefresh) showToast('Could not refresh — showing cached data');
  }

  if (isRefresh) { btn.classList.remove('spinning'); btn.disabled = false; }
  render();
}
function refreshSheet() { loadSheet(true); }

/* ── CSV PARSER ──────────────────────────────────────── */
function parseCSV(raw) {
  const lines = raw.trim().split('\n');
  if (lines.length < 2) { clog('CSV has fewer than 2 lines', 'cwarn'); return []; }
  const headers = splitLine(lines[0]).map(h => h.replace(/^"|"$/g,'').trim());
  clog('CSV headers: ' + headers.join(' | '));
  const rows = [];
  for (let i = 1; i < lines.length; i++) {
    if (!lines[i].trim()) continue;
    const vals = splitLine(lines[i]).map(v => v.replace(/^"|"$/g,'').trim());
    const obj = {};
    headers.forEach((h,j) => { obj[h] = vals[j] || ''; });
    if (obj.Category && obj.Brand && obj.Link) rows.push(obj);
  }
  if (!rows.length) clog('0 valid rows — ensure columns are: Category, Brand, Catalogue Name, Link', 'cwarn');
  return rows;
}
function splitLine(line) {
  const out=[]; let cur=''; let q=false;
  for (const ch of line) {
    if (ch==='"') q=!q;
    else if (ch===',' && !q) { out.push(cur); cur=''; }
    else cur+=ch;
  }
  out.push(cur); return out;
}

/* ── FILTER ──────────────────────────────────────────── */
function filtered() {
  if (!searchQ) return allData;
  const q = searchQ.toLowerCase();
  return allData.filter(r =>
    r.Brand.toLowerCase().includes(q) ||
    (r['Catalogue Name']||'').toLowerCase().includes(q) ||
    r.Category.toLowerCase().includes(q)
  );
}
function hl(text, q) {
  if (!q || !text) return text||'';
  const i = text.toLowerCase().indexOf(q.toLowerCase());
  if (i < 0) return text;
  return text.slice(0,i)+'<span class="hl">'+text.slice(i,i+q.length)+'</span>'+text.slice(i+q.length);
}

/* ── SEARCH ──────────────────────────────────────────── */
function onSearch(val) {
  searchQ = val.trim();
  document.getElementById('search-clear').classList.toggle('show', searchQ.length > 0);
  activeTab = "All";
  render();
}
function clearSearch() {
  document.getElementById('search-input').value = '';
  searchQ = '';
  document.getElementById('search-clear').classList.remove('show');
  render();
}
function switchTab(t) {
  activeTab = t; searchQ = '';
  document.getElementById('search-input').value = '';
  document.getElementById('search-clear').classList.remove('show');
  render();
}

/* ── RENDER ──────────────────────────────────────────── */
function render() {
  clog('render() — ' + allData.length + ' items, selected: ' + selected.size + ', tab: ' + activeTab);
  const cats = [...new Set(allData.map(r => r.Category))];
  cats.forEach(c => catColor(c));

  // tabs
  const tabsRow = document.getElementById('tabs-row');
  if (searchQ) {
    tabsRow.innerHTML = '';
  } else {
    tabsRow.innerHTML =
      `<button class="tab ${activeTab==='All'?'active':''}" data-action="alltab">All</button>` +
      cats.map(c => `<button class="tab ${activeTab===c?'active':''}" data-action="tab" data-cat="${encodeURIComponent(c)}">${c}</button>`).join('');
  }

  const fd = filtered();
  const area = document.getElementById('content-area');

  if (!fd.length) {
    area.innerHTML = `<div class="empty-state"><div class="empty-icon">🔍</div>No results for "<strong>${searchQ}</strong>"</div>`;
    updateBar(); return;
  }

  const visCats = searchQ
    ? [...new Set(fd.map(r => r.Category))]
    : (activeTab === 'All' ? cats : cats.filter(c => c === activeTab));

  area.innerHTML = visCats.map(cat => {
    const items    = fd.filter(r => r.Category === cat);
    const catKeys  = allData.filter(r => r.Category === cat).map(r => getKey(r));
    const allSel   = catKeys.length > 0 && catKeys.every(k => selected.has(k));
    const col      = catColor(cat);

    return `<div class="category-section">
      <div class="cat-header">
        <div class="cat-title-row">
          <div class="cat-initial" style="background:${col.bg};color:${col.fg}">${initial(cat)}</div>
          <span class="cat-name">${cat}</span>
          <span class="cat-count">${items.length}</span>
        </div>
        <button class="select-all-btn ${allSel?'all-selected':''}" data-action="selectall" data-cat="${encodeURIComponent(cat)}">
          ${allSel ? '✓ All selected' : 'Select all'}
        </button>
      </div>
      <div class="brands-grid">
        ${items.map(item => renderCard(item)).join('')}
      </div>
    </div>`;
  }).join('');

  updateBar();
}
document.getElementById('content-area').addEventListener('click', function(e) {
  const selectZone  = e.target.closest('[data-action="select"]');
  const openZone    = e.target.closest('[data-action="open"]');
  const selectAllBtn = e.target.closest('[data-action="selectall"]');
  if (selectZone) {
    const card = selectZone.closest('.brand-card');
    toggleItem(card.dataset.key);
  } else if (openZone) {
    const card = openZone.closest('.brand-card');
    openLink(card.dataset.link);
  } else if (selectAllBtn) {
    toggleAll(decodeURIComponent(selectAllBtn.dataset.cat));
  }
});

document.getElementById('tabs-row').addEventListener('click', function(e) {
  const tab = e.target.closest('[data-action="tab"]');
  if (tab) switchTab(decodeURIComponent(tab.dataset.cat));
  const allTab = e.target.closest('[data-action="alltab"]');
  if (allTab) switchTab('All');
});

/* ── RENDER CARD ─────────────────────────────────────── */
function renderCard(item) {
  const key    = getKey(item);
  const isSel  = selected.has(key);
  const col    = catColor(item.Category);
  const name   = item['Catalogue Name'] || item.Brand;
  // encode for safe inline handler
  const ek     = encodeURIComponent(key);
  const el     = encodeURIComponent(item.Link);

  return `<div class="brand-card ${isSel?'selected':''}" data-key="${ek}" data-link="${el}">

    <!-- TOP: select zone -->
    <div class="card-select-zone" data-action="select">
      <div class="check-circle">
        <svg class="check-icon" width="10" height="10" viewBox="0 0 10 10" fill="none">
          <path d="M1.5 5L4 7.5L8.5 2.5" stroke="#0A243F" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <div class="card-badge" style="background:${col.bg};color:${col.fg}">${initial(item.Category)}</div>
      <div class="brand-name">${hl(name, searchQ)}</div>
      <div class="brand-sub">${hl(item.Brand, searchQ)}</div>
    </div>

    <!-- BOTTOM: open zone — always visible strip -->
    <div class="card-open-zone" data-action="open">
      <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/>
        <polyline points="15 3 21 3 21 9"/>
        <line x1="10" y1="14" x2="21" y2="3"/>
      </svg>
      <span class="card-open-label">Open catalogue</span>
    </div>

  </div>`;
}

/* ── TOGGLE ITEM ─────────────────────────────────────── */
function toggleItem(ek) {
  const key = decodeURIComponent(ek);
  clog('toggleItem: ' + key);
  if (selected.has(key)) selected.delete(key);
  else selected.add(key);
  // patch DOM directly — no full re-render needed
  const card = document.querySelector(`[data-key="${ek}"]`);
  if (card) card.classList.toggle('selected', selected.has(key));
  updateBar();
}

/* ── OPEN LINK ───────────────────────────────────────── */
function openLink(el) {
  const link = decodeURIComponent(el);
  clog('openLink: ' + link);
  if (link) window.open(link, '_blank', 'noopener');
}

/* ── TOGGLE ALL ──────────────────────────────────────── */
function toggleAll(cat) {
  clog('toggleAll: ' + cat);
  const items = allData.filter(r => r.Category === cat);
  const keys  = items.map(r => getKey(r));
  const allSel = keys.every(k => selected.has(k));
  clog('  keys count: ' + keys.length + ', allSel: ' + allSel);
  if (allSel) keys.forEach(k => selected.delete(k));
  else        keys.forEach(k => selected.add(k));
  clog('  selected size after: ' + selected.size);
  render();
}

/* ── CLEAR ALL ───────────────────────────────────────── */
function clearAll() { selected.clear(); render(); }

/* ── BOTTOM BAR ──────────────────────────────────────── */
function updateBar() {
  const bar     = document.getElementById('bottom-bar');
  const countEl = document.getElementById('cart-count');
  const summary = document.getElementById('sel-summary');
  const n       = selected.size;
  countEl.textContent = n;
  if (n === 0) { bar.classList.remove('visible'); return; }
  bar.classList.add('visible');
  const catMap = {};
  selected.forEach(key => {
    const [cat] = key.split('||');
    catMap[cat] = (catMap[cat]||0) + 1;
  });
  const breakdown = Object.entries(catMap).map(([c,v]) => `${v} ${c}`).join(' · ');
  summary.innerHTML = `<strong>${n} catalogue${n>1?'s':''} selected</strong>${breakdown}`;
}

/* ── MESSAGE BUILD ───────────────────────────────────── */
function buildMessage() {
  const byCat = {};
  selected.forEach(key => {
    const item = allData.find(r => getKey(r) === key);
    if (!item) return;
    if (!byCat[item.Category]) byCat[item.Category] = [];
    byCat[item.Category].push(item);
  });

  const hasSanitary = Object.keys(byCat).some(c => c.toLowerCase().includes('sanitaryware'));
  const hasOther    = Object.keys(byCat).some(c => !c.toLowerCase().includes('sanitaryware'));
  const multiCat    = Object.keys(byCat).length > 1;

  let lines = ["Hi, Please find the catalogue" + (selected.size > 1 ? "s" : "") + " below:\n"];

  Object.entries(byCat).forEach(([cat, items]) => {
    if (multiCat) lines.push(`*${cat}*`);
    items.forEach(item => lines.push(`${item['Catalogue Name']||item.Brand}: ${item.Link}`));
    lines.push('');
  });

  if (hasSanitary && hasOther) {
    lines.push("For *Sanitaryware* — kindly share the *product codes* of the items you're interested in.");
    lines.push("For other products — kindly share the *product name, image, or reference* of the items you're interested in.");
    lines.push("We'll share the lowest possible prices for the same. ");
  } else if (hasSanitary) {
    lines.push("Kindly share the *product codes* of the items you're interested in, and we'll share the lowest possible prices for the same.");
  } else {
    lines.push("Kindly share the *product name, image, or reference* of the items you're interested in, and we'll share the lowest possible prices for the same.");
  }

  return lines.join('\n');
}

/* ── COPY ────────────────────────────────────────────── */
function copyMessage() {
  if (!selected.size) return;
  const msg = buildMessage();
  clog('Copying message, length: ' + msg.length);
  const btn = document.getElementById('copy-btn');
  const done = () => {
    btn.innerHTML = `<svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M20 6L9 17l-5-5"/></svg> Copied!`;
    showToast("✓ Message copied — paste it on WhatsApp");
    setTimeout(() => {
      btn.innerHTML = `<svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.2" viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg> Copy Message`;
    }, 2500);
  };
  navigator.clipboard.writeText(msg).then(done).catch(() => {
    const ta = document.createElement('textarea');
    ta.value = msg; ta.style.cssText = 'position:fixed;opacity:0;top:0;left:0;width:1px;height:1px;';
    document.body.appendChild(ta); ta.focus(); ta.select();
    try { document.execCommand('copy'); } catch(e){ clog('execCommand copy failed: '+e, 'cerr'); }
    document.body.removeChild(ta); done();
  });
}

/* ── TOAST ───────────────────────────────────────────── */
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3200);
}

/* ── BOOT ────────────────────────────────────────────── */
clog('App booting...');
loadSheet(false);
</script>
